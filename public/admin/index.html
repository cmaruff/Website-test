<body class="admin">

<aside class="adm-side">
  <a href="/" class="adm-side__logo">
    <span class="nav__logo-mark"></span>

    Trimmed admin. Bookings, customers and invoicing live in QuickBooks

  </div>

<main class="adm-main">
  <header class="adm-bar">
    <h1 id="pageTitle">Dashboard</h1>
