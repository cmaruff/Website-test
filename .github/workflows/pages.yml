name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/analyze-codebase-BhgjH
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine base path
        id: base
        run: |
          # Project Pages serve at /<repo>/  → derive that prefix.
          REPO="${GITHUB_REPOSITORY##*/}"
          echo "base=/${REPO}" >> "$GITHUB_OUTPUT"
          echo "Base path: /${REPO}"

      - name: Stage site & rewrite root-absolute paths
        run: |
          set -eu
          BASE='${{ steps.base.outputs.base }}'
          mkdir -p _site
          cp -R public/. _site/

          # Rewrite root-absolute paths so they include the Pages base path.
          # The repo source stays unchanged (still SiteGround-ready).
          find _site -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i \
              -e "s|href=\"/|href=\"${BASE}/|g" \
              -e "s|src=\"/|src=\"${BASE}/|g" \
              -e "s|action=\"/|action=\"${BASE}/|g" \
              -e "s|\"/admin/|\"${BASE}/admin/|g" \
              -e "s|'/admin/|'${BASE}/admin/|g" \
              -e "s|\"/booking-success|\"${BASE}/booking-success|g" \
              -e "s|'/booking-success|'${BASE}/booking-success|g" {} +

          # SPA-ish fallback: if a visitor hits an unknown URL (e.g. typed
          # /Website-test/admin instead of /Website-test/admin/), Pages serves
          # 404.html. Serving the home page is friendlier than the default.
          cp _site/index.html _site/404.html

          echo "--- _site tree ---"
          ls -la _site
          echo "--- sample rewrite ---"
          grep -E 'href=|src=' _site/index.html | head -10 || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
